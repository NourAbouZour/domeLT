<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOME Ltd — Price List Search</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface2: #ffffff;
    --border: #e0e0e6;
    --text: #1a1a2e;
    --text-dim: #6b6b80;
    --accent: #b8922e;
    --accent-glow: rgba(184,146,46,0.10);
    --accent-dark: #96760f;
    --brand-tag: #ede7f6;
    --brand-text: #5e35b1;
    --radius: 14px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .container {
    max-width: 880px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 42px);
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .header p {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .header .divider {
    width: 60px;
    height: 2px;
    background: var(--accent);
    margin: 18px auto 0;
    border-radius: 1px;
  }

  /* Search area */
  .search-wrapper {
    position: relative;
    margin-bottom: 28px;
  }
  .search-box {
    position: relative;
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .search-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-glow), 0 8px 32px rgba(0,0,0,0.06);
  }
  .search-icon {
    padding: 0 4px 0 18px;
    display: flex;
    align-items: center;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .search-box input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    padding: 16px 12px;
    min-width: 0;
  }
  .search-box input::placeholder { color: var(--text-dim); }
  .clear-btn {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; padding: 0 16px; display: none;
    font-size: 20px; line-height: 1;
    transition: color 0.2s;
  }
  .clear-btn:hover { color: var(--text); }
  .clear-btn.visible { display: block; }

  /* Filter pills */
  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .pill {
    padding: 7px 16px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #ffffff;
    font-weight: 600;
  }

  /* Dropdown suggestions */
  .suggestions {
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    max-height: 340px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    box-shadow: 0 16px 48px rgba(0,0,0,0.10);
  }
  .suggestions.open { display: block; }
  .suggestion-item {
    padding: 12px 18px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover, .suggestion-item.active {
    background: var(--accent-glow);
  }
  .sug-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  .sug-code {
    font-weight: 600;
    font-size: 14px;
    color: var(--accent);
    white-space: nowrap;
  }
  .sug-desc {
    font-size: 13px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sug-brand {
    font-size: 11px;
    font-weight: 600;
    color: var(--brand-text);
    background: var(--brand-tag);
    padding: 3px 10px;
    border-radius: 100px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  mark {
    background: rgba(184,146,46,0.15);
    color: #7a5f00;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* Results count */
  .results-info {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 14px;
    padding-left: 4px;
  }

  /* Result card */
  .result-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 14px;
    transition: border-color 0.25s, transform 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.35s ease both;
  }
  .result-card:hover {
    border-color: var(--accent-dark);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .card-brand {
    font-size: 11px;
    font-weight: 600;
    color: var(--brand-text);
    background: var(--brand-tag);
    padding: 4px 12px;
    border-radius: 100px;
    letter-spacing: 1px;
  }
  .card-price {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: var(--accent);
    white-space: nowrap;
  }
  .card-price-ttc {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dim);
    margin-left: 8px;
  }
  .card-desc {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 14px;
    line-height: 1.4;
  }
  .card-meta {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
  }
  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
    background: var(--bg);
    padding: 10px 14px;
    border-radius: 10px;
  }
  .meta-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
  }
  .meta-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    word-break: break-all;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state svg { margin-bottom: 16px; opacity: 0.4; }
  .empty-state p { font-size: 15px; }
  .empty-state .hint { font-size: 13px; margin-top: 6px; }

  /* Brand filter bar */
  .brand-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 6px;
    margin-bottom: 24px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .brand-scroll::-webkit-scrollbar { height: 4px; }
  .brand-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Responsive */
  @media (max-width: 600px) {
    .container { padding: 24px 14px 40px; }
    .result-card { padding: 18px; }
    .card-price { font-size: 22px; }
    .card-meta { grid-template-columns: 1fr; }
    .suggestion-item { padding: 10px 14px; }
  }
</style>
</head>

const brands = [...new Set(DATA.map(d => d.brand))];
const input = document.getElementById('searchInput');
const sugBox = document.getElementById('suggestions');
const resultsDiv = document.getElementById('results');
const clearBtn = document.getElementById('clearBtn');
const resultsInfo = document.getElementById('resultsInfo');
const brandScroll = document.getElementById('brandScroll');

let activeBrand = null;
let sugIndex = -1;

// Build brand pills
const allPill = document.createElement('div');
allPill.className = 'pill active';
allPill.textContent = 'All';
allPill.onclick = () => { activeBrand = null; updatePills(); doSearch(); };
brandScroll.appendChild(allPill);

brands.forEach(b => {
  const pill = document.createElement('div');
  pill.className = 'pill';
  pill.textContent = b;
  pill.onclick = () => {
    activeBrand = (activeBrand === b) ? null : b;
    updatePills();
    doSearch();
  };
  brandScroll.appendChild(pill);
});

function updatePills() {
  document.querySelectorAll('.pill').forEach(p => {
    if (!activeBrand && p.textContent === 'All') p.classList.add('active');
    else if (p.textContent === activeBrand) p.classList.add('active');
    else p.classList.remove('active');
  });
}

function highlight(text, query) {
  if (!query) return text;
  const esc = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${esc})`, 'gi'), '<mark>$1</mark>');
}

function getFiltered(query) {
  let pool = activeBrand ? DATA.filter(d => d.brand === activeBrand) : DATA;
  if (!query) return pool;
  const q = query.toLowerCase();
  return pool.filter(d =>
    d.itemCode.toLowerCase().includes(q) ||
    d.barcode.toLowerCase().includes(q) ||
    d.description.toLowerCase().includes(q)
  );
}

function showSuggestions(query) {
  sugIndex = -1;
  if (!query || query.length < 1) { sugBox.classList.remove('open'); return; }
  const matches = getFiltered(query).slice(0, 8);
  if (!matches.length) { sugBox.classList.remove('open'); return; }

  sugBox.innerHTML = matches.map((m, i) => `
    <div class="suggestion-item" data-idx="${i}">
      <div class="sug-left">
        <span class="sug-code">${highlight(m.itemCode, query)}</span>
        <span class="sug-desc">${highlight(m.description, query)}</span>
      </div>
      <span class="sug-brand">${m.brand}</span>
    </div>
  `).join('');
  sugBox.classList.add('open');

  sugBox.querySelectorAll('.suggestion-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      const item = matches[idx];
      input.value = item.itemCode;
      sugBox.classList.remove('open');
      showResults([item], item.itemCode);
    });
  });
}

function showResults(items, query) {
  clearBtn.classList.toggle('visible', !!input.value);
  if (!items.length && query) {
    resultsInfo.textContent = '';
    resultsDiv.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="20" cy="20" r="14"/><line x1="30" y1="30" x2="42" y2="42"/></svg>
        <p>No products found for "${query}"</p>
        <p class="hint">Try a different item code, barcode, or keyword</p>
      </div>`;
    return;
  }
  if (!query && !activeBrand) {
    resultsInfo.textContent = `Showing all ${items.length} products`;
  } else if (!query && activeBrand) {
    resultsInfo.textContent = `${items.length} products in ${activeBrand}`;
  } else {
    resultsInfo.textContent = `${items.length} result${items.length !== 1 ? 's' : ''} found`;
  }

  resultsDiv.innerHTML = items.map((m, i) => {
    const ht = typeof m.price === 'number' ? m.price : parseFloat(m.price);
    const ttc = (ht * 1.11).toFixed(2);
    const htDisplay = typeof m.price === 'number' ? m.price.toFixed(2) : m.price;
    return `
    <div class="result-card" style="animation-delay:${Math.min(i * 0.04, 0.4)}s">
      <div class="card-top">
        <span class="card-brand">${m.brand}</span>
        <span class="card-price">$${htDisplay} <span class="card-price-ttc">TTC $${ttc}</span></span>
      </div>
      <div class="card-desc">${highlight(m.description, query)}</div>
      <div class="card-meta">
        <div class="meta-item">
          <span class="meta-label">Item Code</span>
          <span class="meta-value">${highlight(m.itemCode, query)}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Barcode</span>
          <span class="meta-value">${highlight(m.barcode, query)}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Price (USD HT)</span>
          <span class="meta-value">$${htDisplay}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Price (USD TTC incl. 11% TVA)</span>
          <span class="meta-value">$${ttc}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function doSearch() {
  const q = input.value.trim();
  const items = getFiltered(q);
  showResults(items, q);
  showSuggestions(q);
}

input.addEventListener('input', doSearch);

input.addEventListener('keydown', e => {
  const items = sugBox.querySelectorAll('.suggestion-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    sugIndex = Math.min(sugIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === sugIndex));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    sugIndex = Math.max(sugIndex - 1, 0);
    items.forEach((el, i) => el.classList.toggle('active', i === sugIndex));
  } else if (e.key === 'Enter' && sugIndex >= 0) {
    e.preventDefault();
    items[sugIndex].click();
  }
});

clearBtn.addEventListener('click', () => {
  input.value = '';
  clearBtn.classList.remove('visible');
  sugBox.classList.remove('open');
  doSearch();
  input.focus();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrapper')) sugBox.classList.remove('open');
});

// Initial render
doSearch();
</script>
